name: Update WC results
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: results-update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: node results_updater.js
      - name: Commit and push (with rebase + retry)
        run: |
          git config user.name "results-bot"
          git config user.email "bot@users.noreply.github.com"
          if git diff --quiet results.json; then
            echo "no change"; exit 0
          fi
          git add results.json
          git commit -m "results $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "pushed"; exit 0
            fi
            echo "push attempt $i failed, retrying..."; sleep 3
          done
          echo "push failed after retries"; exit 1
